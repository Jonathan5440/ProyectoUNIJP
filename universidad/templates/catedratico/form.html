{% extends 'base.html' %}
{% block title %}Catedrático{% endblock %}
{% block page_title %}{% if catedratico %}Editar{% else %}Nuevo{% endif %} Catedrático{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="first_name" class="form-control" value="{{ catedratico.first_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" name="last_name" class="form-control" value="{{ catedratico.last_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ catedratico.email }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" name="phone" class="form-control" value="{{ catedratico.phone }}">
            </div>
            <a href="{% url 'catedratico_list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
