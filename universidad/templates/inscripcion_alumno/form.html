{% extends 'base.html' %}
{% block title %}Inscripción{% endblock %}
{% block page_title %}{% if inscripcion %}Editar{% else %}Nueva{% endif %} Inscripción{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Alumno</label>
                <select name="alumno" class="form-control" required>
                    {% for a in alumnos %}
                    <option value="{{ a.pk }}" {% if inscripcion.alumno_id == a.pk %}selected{% endif %}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Asignación</label>
                <select name="asignacion" class="form-control" required>
                    {% for a in asignaciones %}
                    <option value="{{ a.pk }}" {% if inscripcion.asignacion_id == a.pk %}selected{% endif %}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
            <a href="{% url 'inscripcion_list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
