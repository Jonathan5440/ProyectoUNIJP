{% extends 'base.html' %}
{% block title %}Asignación{% endblock %}
{% block page_title %}{% if asignacion %}Editar{% else %}Nueva{% endif %} Asignación{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Curso</label>
                <select name="curso" class="form-control" required>
                    {% for c in cursos %}
                    <option value="{{ c.pk }}" {% if asignacion.curso_id == c.pk %}selected{% endif %}>{{ c.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Catedrático</label>
                <select name="catedratico" class="form-control" required>
                    {% for c in catedraticos %}
                    <option value="{{ c.pk }}" {% if asignacion.catedratico_id == c.pk %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Horario</label>
                <input type="text" name="horario" class="form-control" value="{{ asignacion.horario }}" required>
            </div>
            <a href="{% url 'asignacion_list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
