{% extends 'base.html' %}
{% block title %}Curso{% endblock %}
{% block page_title %}{% if curso %}Editar{% else %}Nuevo{% endif %} Curso{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ curso.nombre }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control">{{ curso.descripcion }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Créditos</label>
                <input type="number" name="creditos" class="form-control" value="{{ curso.creditos|default:3 }}" required>
            </div>
            <a href="{% url 'curso_list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
