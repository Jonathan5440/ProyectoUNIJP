{% extends 'base.html' %}
{% block title %}Nota{% endblock %}
{% block page_title %}{% if nota %}Editar{% else %}Nueva{% endif %} Nota{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Inscripción</label>
                <select name="inscripcion" class="form-control" required>
                    {% for i in inscripciones %}
                    <option value="{{ i.pk }}" {% if nota.inscripcion_id == i.pk %}selected{% endif %}>{{ i }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Nota</label>
                <input type="number" step="0.01" name="nota" class="form-control" value="{{ nota.nota }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" name="descripcion" class="form-control" value="{{ nota.descripcion }}">
            </div>
            <a href="{% url 'notas_list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
