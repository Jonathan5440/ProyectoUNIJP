{% extends 'base.html' %}
{% block title %}Alumno{% endblock %}
{% block page_title %}{% if alumno %}Editar{% else %}Nuevo{% endif %} Alumno{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="first_name" class="form-control" value="{{ alumno.first_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" name="last_name" class="form-control" value="{{ alumno.last_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ alumno.email }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" name="phone" class="form-control" value="{{ alumno.phone }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Género</label>
                <select name="gender" class="form-control" required>
                    <option value="M" {% if alumno.gender == 'M' %}selected{% endif %}>Masculino</option>
                    <option value="F" {% if alumno.gender == 'F' %}selected{% endif %}>Femenino</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha de nacimiento</label>
                <input type="date" name="birth_date" class="form-control" value="{{ alumno.birth_date }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="is_active" class="form-control">
                    <option value="True" {% if alumno.is_active %}selected{% endif %}>Activo</option>
                    <option value="False" {% if not alumno.is_active %}selected{% endif %}>Inactivo</option>
                </select>
            </div>
            <a href="{% url 'alumno:list' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
